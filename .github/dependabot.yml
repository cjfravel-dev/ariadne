version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      spark-delta:
        patterns:
          - "org.apache.spark:*"
          - "io.delta:*"
      shaded-runtime:
        patterns:
          - "com.google.code.gson:gson"
          - "com.google.guava:guava"
          - "com.google.errorprone:error_prone_annotations"
      test-libraries:
        dependency-type: "development"
        patterns:
          - "org.scalatest:*"
          - "org.scalatestplus:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
    ignore:
      - dependency-name: "org.apache.spark:*"
      - dependency-name: "io.delta:*"
      - dependency-name: "org.scala-lang:*"
      - dependency-name: "org.apache.logging.log4j:*"
      - dependency-name: "com.fasterxml.jackson.*:*"
      # Newer Scala 2.13-only plugin versions cannot satisfy the Synapse Scala 2.12 build.
      - dependency-name: "org.antipathy:mvn-scalafmt_2.13"
      # Versions after 2.0.6 require Java 17; Synapse runs Java 11.
      - dependency-name: "org.scoverage:scoverage-maven-plugin"
