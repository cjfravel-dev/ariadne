name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test (Spark 3.5)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Check Scala formatting (scalafmt)
        run: mvn -B validate -Dgpg.skip=true

      - name: Build and test with coverage
        run: mvn verify scoverage:report -Dgpg.skip=true -B -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-spark35
          path: target/cobertura.xml

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: target/cobertura.xml
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          hide_complexity: true
          thresholds: "60 80"

      - name: Prepend header to coverage report
        if: github.event_name == 'pull_request'
        run: |
          sed -i '1s/^/## Code Coverage — Spark 3.5\n\n/' code-coverage-results.md

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-spark35
          path: code-coverage-results.md

  build-spark41:
    runs-on: ubuntu-latest
    name: Build & Test (Spark 4.1)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test (Spark 4.1)
        run: mvn -B verify -Pspark41 -Dgpg.skip=true
