name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test (Spark 3.5)
    permissions:
      contents: read
      pull-requests: write
    env:
      MAVEN_OPTS: -Xmx8g -XX:+UseG1GC

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Check Scala formatting (scalafmt)
        run: mvn -B validate -Dgpg.skip=true

      - name: Build and test with coverage
        run: |
          mvn -B -q scoverage:report -Dgpg.skip=true
          mvn -B -q verify -DskipTests -Dgpg.skip=true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-spark35
          path: target/cobertura.xml

      - name: Post coverage to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: target/cobertura.xml
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          hide_complexity: true
          thresholds: "60 80"

      - name: Prepend header to coverage report
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          sed -i '1s/^/## Code Coverage — Spark 3.5\n\n/' code-coverage-results.md

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-spark35
          path: code-coverage-results.md

  build-spark41:
    runs-on: ubuntu-latest
    name: Build & Test (Spark 4.1)
    env:
      MAVEN_OPTS: -Xmx8g -XX:+UseG1GC

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test (Spark 4.1)
        run: mvn -B verify -Pspark41 -Dgpg.skip=true
